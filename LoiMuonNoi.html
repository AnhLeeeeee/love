<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial;
}

canvas{
position:absolute;
top:0;
left:0;
}

#matrix{z-index:1;}
#particles{z-index:2;}

#startHeart{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
cursor:pointer;
z-index:5;
}

.btn{
position:fixed;
bottom:100px;
left:50%;
transform:translateX(-50%);
padding:14px 32px;
font-size:18px;
border-radius:40px;
border:1px solid rgba(255,255,255,0.3);
background:rgba(0,0,0,0.6);
color:white;
backdrop-filter:blur(6px);
cursor:pointer;
z-index:6;
}

#next{display:none;}
#replay{display:none;}

.heart{
position:absolute;
color:#ff4d6d;
font-size:24px;
animation:float 4s linear infinite;
}

@keyframes float{

0%{
transform:translateY(0) scale(1);
opacity:1;
}

100%{
transform:translateY(-900px) scale(1.5);
opacity:0;
}

}

</style>
</head>

<body>

<canvas id="startHeart" width="500" height="400"></canvas>

<canvas id="matrix"></canvas>
<canvas id="particles"></canvas>

<div id="next" class="btn">❤️ Xem tiếp</div>
<div id="replay" class="btn">🔁 Xem lại</div>

<script>

/* MATRIX BACKGROUND */

const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const letters=["L","O","V","E","Y","O","U","❤️"];

const fontSize=16;
const columns=Math.floor(canvas.width/fontSize);

const drops=[];

for(let i=0;i<columns;i++) drops[i]=1;

function drawMatrix(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="rgba(255,255,255,0.2)";
ctx.font=fontSize+"px monospace";

for(let i=0;i<drops.length;i++){

let text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.97)
drops[i]=0;

drops[i]+=1.5;

}

}

setInterval(drawMatrix,40);


/* PARTICLE TEXT */

const pCanvas=document.getElementById("particles");
const pCtx=pCanvas.getContext("2d");

pCanvas.width=window.innerWidth;
pCanvas.height=window.innerHeight;

let particles=[];

class Particle{

constructor(x,y){

this.x=Math.random()*pCanvas.width;
this.y=Math.random()*pCanvas.height;

this.tx=x;
this.ty=y;

this.size=1.5;

}

update(){

this.x+=(this.tx-this.x)*0.015;
this.y+=(this.ty-this.y)*0.015;

}

draw(){

pCtx.fillStyle="#fff";
pCtx.fillRect(this.x,this.y,this.size,this.size);

}

}

function createText(message){

particles=[];

let off=document.createElement("canvas");
let offCtx=off.getContext("2d");

off.width=pCanvas.width;
off.height=pCanvas.height;

let textSize=Math.max(60,window.innerWidth/7);

offCtx.fillStyle="white";
offCtx.textAlign="center";
offCtx.font="bold "+textSize+"px Arial";

let lines=message.split("\n");

let lineHeight=textSize*1.3;

for(let i=0;i<lines.length;i++){

offCtx.fillText(
lines[i],
off.width/2,
off.height/2+(i-(lines.length-1)/2)*lineHeight
);

}

let data=offCtx.getImageData(0,0,off.width,off.height).data;

for(let y=0;y<off.height;y+=4){
for(let x=0;x<off.width;x+=4){

let index=(y*off.width+x)*4;

if(data[index+3]>128){
particles.push(new Particle(x,y));
}

}

}

}

function animateParticles(){

pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);

particles.forEach(p=>{
p.update();
p.draw();
});

requestAnimationFrame(animateParticles);

}


/* FLOATING HEARTS */

function floatingHearts(){

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.top=window.innerHeight+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);

},400);

}


/* LOVE CONFESSION MESSAGES */

const messages=[

"Làm\nngười yêu anh\nnhéee",

"Anh thích em\nlâu rồi.",

"Ở cạnh\nanh nhé.",

"HỨA\nsẽ thương em\ncả đời.",

"Love you."

];

let index=0;

function showMessage(){

createText(messages[index]);

document.getElementById("next").style.display="block";

}

document.getElementById("next").onclick=()=>{

document.getElementById("music").play();

index++;

if(index<messages.length){

showMessage();

}else{

document.getElementById("next").style.display="none";

floatingHearts();

document.getElementById("replay").style.display="block";

}

}

document.getElementById("replay").onclick=()=>{

particles=[];
index=0;

document.getElementById("replay").style.display="none";

showMessage();

}


/* HEART MADE FROM "LOVE YOU" */

const heartCanvas=document.getElementById("startHeart");
const hctx=heartCanvas.getContext("2d");

let heartParticles=[];

function createHeart(){

let centerX=250;
let centerY=200;
let scale=12;

for(let t=0;t<Math.PI*2;t+=0.03){

let x=16*Math.pow(Math.sin(t),3);
let y=13*Math.cos(t)
-5*Math.cos(2*t)
-2*Math.cos(3*t)
-Math.cos(4*t);

let px=centerX+x*scale;
let py=centerY-y*scale;

heartParticles.push({
x:Math.random()*500,
y:Math.random()*400,
tx:px,
ty:py
});

}

}

function animateHeart(){

hctx.clearRect(0,0,500,400);

heartParticles.forEach(p=>{

p.x+=(p.tx-p.x)*0.05;
p.y+=(p.ty-p.y)*0.05;

hctx.fillStyle="#ff4d6d";
hctx.font="10px Arial";
hctx.fillText("LOVE YOU",p.x,p.y);

});

requestAnimationFrame(animateHeart);

}

createHeart();
animateHeart();


/* CLICK HEART TO START */

heartCanvas.onclick=()=>{

heartCanvas.style.display="none";

document.getElementById("music").play();

showMessage();

}

animateParticles();

</script>

<audio id="music" loop>
<source src="https://files.catbox.moe/2mmzim.mp3" type="audio/mpeg">
</audio>

</body>
</html>
